<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>UPS Assistant</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f1117;color:#e2e8f0;font-family:'IBM Plex Mono','Courier New',monospace;min-height:100vh}
  input,select,textarea,button{font-family:inherit}
  select option{background:#0f1117;color:#e2e8f0}

  /* HEADER */
  .header{background:#161b27;border-bottom:1px solid #1e293b;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .logo-wrap{display:flex;align-items:center;gap:10px}
  .logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#f59e0b,#ef4444);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
  .logo-title{font-size:13px;font-weight:700;color:#f8fafc;letter-spacing:.08em}
  .logo-sub{font-size:10px;color:#64748b}
  .nav-btn{padding:7px 13px;border-radius:6px;border:1px solid #1e293b;background:transparent;color:#64748b;font-size:11px;cursor:pointer}
  .nav-btn.active{border-color:#f59e0b;background:rgba(245,158,11,.1);color:#f59e0b}

  /* BODY */
  .body{padding:16px;max-width:500px;margin:0 auto}

  /* SECTION */
  .section{background:#161b27;border:1px solid #1e293b;border-radius:10px;padding:16px;margin-bottom:12px}
  .sec-title{font-size:10px;color:#f59e0b;letter-spacing:.15em;text-transform:uppercase;font-weight:700;margin-bottom:14px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:10px;color:#64748b;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
  .field input,.field select,.field textarea{display:block;width:100%;background:#0f1117;border:1px solid #1e293b;border-radius:6px;padding:10px 11px;color:#e2e8f0;font-size:14px;outline:none}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:#f59e0b}
  .field textarea{resize:vertical;min-height:80px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  /* CALC BOX */
  .calc-box{background:#0f1117;border:1px solid #1e293b;border-radius:6px;padding:10px 11px;font-size:14px;color:#f59e0b}
  .calc-note{font-size:11px;color:#64748b;margin-left:8px}

  /* SPLIT FLAG */
  .split-toggle{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 12px;background:#0f1117;border:1px solid #1e293b;border-radius:6px;cursor:pointer;user-select:none}
  .split-toggle input[type=checkbox]{width:16px;height:16px;accent-color:#f59e0b;cursor:pointer;flex-shrink:0}
  .split-toggle-label{font-size:12px;color:#94a3b8}

  /* BUTTONS */
  .save-btn{display:block;width:100%;background:linear-gradient(135deg,#f59e0b,#d97706);color:#0f1117;border:none;border-radius:8px;padding:14px;font-size:13px;font-weight:700;letter-spacing:.08em;cursor:pointer;margin-bottom:4px}
  .outline-btn{display:block;width:100%;background:transparent;border:1px dashed #f59e0b;border-radius:6px;padding:9px;color:#f59e0b;font-size:11px;cursor:pointer;margin-top:8px}
  .cancel-btn{display:block;width:100%;background:transparent;border:1px solid #1e293b;border-radius:6px;padding:9px;color:#64748b;font-size:11px;cursor:pointer;margin-top:6px}

  /* INLINE ADD BOX */
  .inline-box{background:#0f1117;border:1px dashed #f59e0b;border-radius:8px;padding:12px;margin-bottom:12px}
  .inline-box label{display:block;font-size:10px;color:#64748b;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
  .inline-box input{display:block;width:100%;background:#161b27;border:1px solid #1e293b;border-radius:6px;padding:10px 11px;color:#e2e8f0;font-size:14px;outline:none;margin-bottom:8px}
  .inline-btns{display:flex;gap:8px}
  .inline-btns button{flex:1;padding:9px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit}
  .inline-btns .confirm{background:linear-gradient(135deg,#f59e0b,#d97706);color:#0f1117;border:none;font-weight:700}
  .inline-btns .cancel{background:transparent;border:1px solid #1e293b;color:#64748b}

  /* SEARCH */
  .search-wrap{background:#161b27;border:1px solid #1e293b;border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:8px;margin-bottom:14px}
  .search-wrap input{flex:1;background:none;border:none;outline:none;color:#e2e8f0;font-size:14px;min-width:0}
  .search-clear{color:#64748b;cursor:pointer;font-size:18px;flex-shrink:0}

  /* CLIENT CARD */
  .client-card{background:#161b27;border:1px solid #1e293b;border-radius:10px;margin-bottom:12px;overflow:hidden;cursor:pointer;transition:border-color .15s}
  .client-card:hover{border-color:#f59e0b}
  .card-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
  .card-name{font-size:14px;font-weight:700;color:#f8fafc}
  .card-loc{font-size:11px;color:#64748b;margin-top:2px}
  .badge{border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;white-space:nowrap;border:1px solid}
  .ups-row{padding:9px 14px;border-top:1px solid #1e293b}
  .ups-row-name{font-size:12px;color:#94a3b8;font-weight:600}
  .ups-row-batt{font-size:10px;margin-top:2px}

  /* DETAIL */
  .detail-sec{border-top:1px solid #1e293b;padding:12px 14px}
  .detail-sec-title{font-size:10px;color:#f59e0b;letter-spacing:.12em;text-transform:uppercase;font-weight:700;margin-bottom:10px}
  .detail-item{margin-bottom:8px}
  .detail-label{font-size:10px;color:#64748b;letter-spacing:.08em;text-transform:uppercase}
  .detail-value{font-size:13px;color:#e2e8f0;font-weight:600;margin-top:1px}
  .detail-value.accent{color:#f59e0b}
  .notes-box{margin:0 14px 14px;background:#0f1117;border-radius:6px;padding:10px;font-size:12px;color:#94a3b8;border-left:3px solid #f59e0b;line-height:1.6}
  .added-at{padding:6px 14px 10px;font-size:10px;color:#334155}
  .delete-btn{background:transparent;border:1px solid rgba(239,68,68,.3);border-radius:5px;padding:4px 10px;color:#ef4444;font-size:10px;cursor:pointer;flex-shrink:0}

  /* DETAIL HEADER */
  .detail-head{padding:12px 14px;background:rgba(245,158,11,.08);border-bottom:1px solid #1e293b;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
  .detail-head-name{font-size:15px;font-weight:700;color:#f59e0b}
  .detail-head-sub{font-size:11px;color:#64748b;margin-top:2px}

  /* BACK */
  .back-btn{font-size:11px;color:#f59e0b;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;gap:5px}

  /* EMPTY */
  .empty{text-align:center;padding:50px 20px;color:#334155}
  .empty-icon{font-size:36px;margin-bottom:10px}
  .empty-title{font-size:13px;margin-bottom:6px}
  .empty-sub{font-size:11px}

  /* FAB */
  .fab{position:fixed;bottom:20px;right:20px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#0f1117;border:none;border-radius:50%;width:52px;height:52px;font-size:22px;cursor:pointer;box-shadow:0 4px 18px rgba(245,158,11,.4);display:flex;align-items:center;justify-content:center;z-index:50}

  /* TOAST */
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:11px 22px;border-radius:8px;font-size:13px;z-index:999;white-space:nowrap;pointer-events:none}
  .toast.ok{background:#14532d;border:1px solid #22c55e;color:#f8fafc}
  .toast.err{background:#7f1d1d;border:1px solid #ef4444;color:#f8fafc}

  .spacer{height:60px}
</style>
</head>
<body>

<div id="app"></div>

<script>
const UPS_CATALOG = {
  "Eaton":["5P","5PX","9PX","9SX","9E","EX RT","Ellipse ECO","3S","5E","Pulsar M","EPE","93PM","93E","BladeUPS"],
  "APC / Schneider":["Smart-UPS 750","Smart-UPS 1000","Smart-UPS 1500","Smart-UPS 2200","Smart-UPS 3000","Smart-UPS RT","Symmetra LX","Symmetra PX","Galaxy 3500","Galaxy 5500","Easy UPS"],
  "Riello":["iDialog","Dialog Vision","Dialog+","Mistral","Sentinel Dual","Sentinel Pro","UPower","Master HP","Master MHT","Megaline","Multi Sentry"],
  "Vertiv":["Liebert GXT4","Liebert GXT5","Liebert PSI5","Liebert ITA2","Liebert EXL S1","Liebert APM","Liebert NXC","Liebert NXL","Liebert EXM2"],
  "Socomec":["NETYS PR","NETYS RT","ITYS E","ITYS R","DIGYS","DELPHYS GP","DELPHYS MX","MODULYS GP","MASTERYS GP4"],
  "Legrand":["Keor SP","Keor LP","Keor S","Keor T","Keor Multiplug","Daker DK","Niky S","Megaline"],
  "Salicru":["SLC ADVANCE","SLC CUBE3+","SPS.ONE","SPS SOHO","EQX","SLC X-PERT"],
  "CyberPower":["PR750ELCD","PR1000ELCD","PR1500ELCD","PR2200ELCD","OR600ERM1U","OL1000ERT2U","OL2000ERT2U"],
  "Powerware":["9120","9130","9140","9150","9155","9170+","9315"],
  "Ever":["ECO Pro","Sinline RT XL","Powerline RT","Forte","Ecoline"],
};
const BATTERY_BRANDS=["YUASA","CSB","Fiamm","Vision","Enerpower","Elsypower","Energy Safe","Leoch","Sonnenschein","EnerSys","Banner","Panasonic","Coslight","Altra"];
const CONFIGS=["1F in / 1F out","3F in / 1F out","3F in / 3F out","1F in / 3F out"];
const TOPOLOGIE=["Online","Line-interactive","Standby / Off-line","Delta conversion"];
const SK="ups_v3";

function load(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):{clients:[],customBrands:{}}}catch{return{clients:[],customBrands:{}}}}
function save(d){try{localStorage.setItem(SK,JSON.stringify(d))}catch{}}

let DB=load();
let view="search"; // search | add | detail
let activeClientId=null;
let search="";
let form=emptyForm();
let addingBrand=false;
let addingModel=false;

function emptyForm(){
  return{clientName:"",location:"",brand:"",newBrand:"",model:"",newModel:"",
    power:"",topology:"",configIO:"",serial:"",yearMfg:"",voltageIn:"",voltageOut:"",
    battBrand:"",battModel:"",battVoltage:"",battAh:"",battElements:"",battStrings:"",
    battInstallDate:"",battSplit:false,notes:""};
}

function allBrands(){return[...Object.keys(UPS_CATALOG),...Object.keys(DB.customBrands||{})].sort()}
function modelsFor(b){return[...(UPS_CATALOG[b]||[]),...((DB.customBrands||{})[b]||[])]}

function totalV(){
  const v=parseFloat(form.battVoltage),n=parseInt(form.battElements);
  if(!isNaN(v)&&!isNaN(n)&&n>0){
    const tot=v*n;
    return form.battSplit?`${tot/2}V + ${tot/2}V (con neutro)`:`${tot}V`;
  }
  return "—";
}

function batteryAge(d){
  if(!d)return null;
  const p=d.split("/");if(p.length!==3)return null;
  const inst=new Date(`${p[2]}-${p[1]}-${p[0]}`);if(isNaN(inst))return null;
  const months=Math.floor((Date.now()-inst)/(1000*60*60*24*30));
  if(months>48)return{label:`${months}m ⚠️ SCADUTA`,color:"#ef4444"};
  if(months>36)return{label:`${months}m 🔶 In scadenza`,color:"#f59e0b"};
  return{label:`${months}m ✅`,color:"#22c55e"};
}

let toastTimer=null;
function showToast(msg,type="ok"){
  clearTimeout(toastTimer);
  const old=document.querySelector(".toast");
  if(old)old.remove();
  const t=document.createElement("div");
  t.className=`toast ${type}`;t.textContent=msg;
  document.body.appendChild(t);
  toastTimer=setTimeout(()=>t.remove(),2500);
}

// ── RENDER ────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");
  if(view==="add"){app.innerHTML=renderAdd();}
  else if(view==="detail"){app.innerHTML=renderDetail();}
  else{app.innerHTML=renderSearch();}
  bindEvents();
}

function logoHTML(sub){
  return`<div class="logo-wrap">
    <div class="logo-icon">⚡</div>
    <div><div class="logo-title">UPS ASSISTANT</div><div class="logo-sub">${sub}</div></div>
  </div>`;
}

// ── SEARCH ────────────────────────────────────────────
function renderSearch(){
  const filtered=DB.clients.filter(c=>
    c.name.toLowerCase().includes(search.toLowerCase())||
    (c.location||"").toLowerCase().includes(search.toLowerCase())
  );
  let cards="";
  if(filtered.length===0){
    cards=`<div class="empty">
      <div class="empty-icon">⚡</div>
      <div class="empty-title">${DB.clients.length===0?"Nessun impianto registrato":"Nessun risultato"}</div>
      <div class="empty-sub">${DB.clients.length===0?"Premi + Nuovo per iniziare":"Prova con un altro nome"}</div>
    </div>`;
  } else {
    filtered.forEach(c=>{
      let upsRows="";
      c.ups.forEach(u=>{
        const bAge=batteryAge(u.battery?.installDate);
        upsRows+=`<div class="ups-row">
          <div class="ups-row-name">${esc(u.brand)} ${esc(u.model)}${u.power?` · ${esc(u.power)}kVA`:""}</div>
          ${bAge?`<div class="ups-row-batt" style="color:${bAge.color}">🔋 ${bAge.label}</div>`:""}
        </div>`;
      });
      cards+=`<div class="client-card" data-id="${c.id}">
        <div class="card-head">
          <div>
            <div class="card-name">${esc(c.name)}</div>
            ${c.location?`<div class="card-loc">📍 ${esc(c.location)}</div>`:""}
          </div>
          <span class="badge" style="color:#64748b;border-color:#334155;background:rgba(100,116,139,.15)">${c.ups.length} UPS</span>
        </div>
        ${upsRows}
      </div>`;
    });
  }
  return`<div class="header">
    ${logoHTML("Field Manager v1")}
    <button class="nav-btn" id="btn-new">+ Nuovo</button>
  </div>
  <div class="body">
    <div class="search-wrap">
      <span style="color:#64748b">🔍</span>
      <input id="search-input" placeholder="Cerca cliente o indirizzo..." value="${esc(search)}" autocomplete="off"/>
      ${search?`<span class="search-clear" id="search-clear">×</span>`:""}
    </div>
    ${cards}
    <div class="spacer"></div>
  </div>
  <button class="fab" id="fab-new">+</button>`;
}

// ── ADD ───────────────────────────────────────────────
function renderAdd(){
  const models=modelsFor(form.brand);
  const brandOpts=allBrands().map(b=>`<option value="${esc(b)}"${form.brand===b?" selected":""}>${esc(b)}</option>`).join("");
  const modelOpts=models.map(m=>`<option value="${esc(m)}"${form.model===m?" selected":""}>${esc(m)}</option>`).join("");
  const battBrandOpts=BATTERY_BRANDS.map(b=>`<option value="${esc(b)}"${form.battBrand===b?" selected":""}>${esc(b)}</option>`).join("");
  const topOpts=TOPOLOGIE.map(t=>`<option value="${esc(t)}"${form.topology===t?" selected":""}>${esc(t)}</option>`).join("");
  const cfgOpts=CONFIGS.map(c=>`<option value="${esc(c)}"${form.configIO===c?" selected":""}>${esc(c)}</option>`).join("");

  const tv=totalV();

  return`<div class="header">
    ${logoHTML("Nuovo impianto")}
    <button class="nav-btn" id="btn-cancel">← Annulla</button>
  </div>
  <div class="body">

    <div class="section">
      <div class="sec-title">👤 Cliente</div>
      <div class="field"><label>Nome cliente *</label><input id="f-clientName" value="${esc(form.clientName)}" placeholder="es. Rossi Srl"/></div>
      <div class="field"><label>Sede / Indirizzo</label><input id="f-location" value="${esc(form.location)}" placeholder="es. Via Roma 5, Milano"/></div>
    </div>

    <div class="section">
      <div class="sec-title">⚡ Dati UPS</div>

      <div class="field">
        <label>Marca *</label>
        <select id="f-brand">
          <option value="">— Seleziona marca —</option>
          ${brandOpts}
          <option value="__add__">➕ Aggiungi nuova marca...</option>
        </select>
      </div>
      ${addingBrand?`<div class="inline-box">
        <label>Nome nuova marca</label>
        <input id="f-newBrand" value="${esc(form.newBrand)}" placeholder="es. Socomec" autofocus/>
        <div class="inline-btns">
          <button class="confirm" id="btn-saveBrand">Aggiungi</button>
          <button class="cancel" id="btn-cancelBrand">Annulla</button>
        </div>
      </div>`:""}

      <div class="field">
        <label>Modello *</label>
        <select id="f-model" ${!form.brand?"disabled":""}>
          <option value="">${form.brand?"— Seleziona modello —":"— Prima seleziona marca —"}</option>
          ${modelOpts}
          ${form.brand?`<option value="__add__">➕ Aggiungi nuovo modello...</option>`:""}
        </select>
      </div>
      ${addingModel?`<div class="inline-box">
        <label>Nome nuovo modello</label>
        <input id="f-newModel" value="${esc(form.newModel)}" placeholder="es. 9PX 3000i RT2U" autofocus/>
        <div class="inline-btns">
          <button class="confirm" id="btn-saveModel">Aggiungi</button>
          <button class="cancel" id="btn-cancelModel">Annulla</button>
        </div>
      </div>`:""}

      <div class="row2">
        <div class="field"><label>Potenza (kVA)</label><input id="f-power" type="number" value="${esc(form.power)}" placeholder="3"/></div>
        <div class="field"><label>Anno fabbrica</label><input id="f-yearMfg" type="number" value="${esc(form.yearMfg)}" placeholder="2021"/></div>
      </div>
      <div class="field"><label>N° Seriale</label><input id="f-serial" value="${esc(form.serial)}" placeholder="es. G123456789"/></div>
      <div class="field"><label>Topologia</label><select id="f-topology"><option value="">—</option>${topOpts}</select></div>
      <div class="field"><label>Configurazione ingresso / uscita</label><select id="f-configIO"><option value="">—</option>${cfgOpts}</select></div>
      <div class="row2">
        <div class="field"><label>Tensione in (V)</label><input id="f-voltageIn" type="number" value="${esc(form.voltageIn)}" placeholder="230"/></div>
        <div class="field"><label>Tensione out (V)</label><input id="f-voltageOut" type="number" value="${esc(form.voltageOut)}" placeholder="230"/></div>
      </div>
    </div>

    <div class="section">
      <div class="sec-title">🔋 Batterie</div>
      <div class="field"><label>Marca batteria</label><select id="f-battBrand"><option value="">—</option>${battBrandOpts}</select></div>
      <div class="field"><label>Modello batteria</label><input id="f-battModel" value="${esc(form.battModel)}" placeholder="es. NPL65-12"/></div>
      <div class="row2">
        <div class="field"><label>Tensione elemento (V)</label><input id="f-battVoltage" type="number" value="${esc(form.battVoltage)}" placeholder="12"/></div>
        <div class="field"><label>Capacità (Ah)</label><input id="f-battAh" type="number" value="${esc(form.battAh)}" placeholder="65"/></div>
      </div>
      <div class="row2">
        <div class="field"><label>Elementi per stringa</label><input id="f-battElements" type="number" value="${esc(form.battElements)}" placeholder="4"/></div>
        <div class="field"><label>N° stringhe</label><input id="f-battStrings" type="number" value="${esc(form.battStrings)}" placeholder="2"/></div>
      </div>
      <div class="field"><label>Data installazione (gg/mm/aaaa)</label><input id="f-battInstallDate" value="${esc(form.battInstallDate)}" placeholder="15/03/2023"/></div>

      <label class="split-toggle" id="split-toggle">
        <input type="checkbox" id="f-battSplit" ${form.battSplit?"checked":""}/>
        <span class="split-toggle-label">🔀 Batterie divise (neutro) — tensione spezzata a metà</span>
      </label>

      <div class="field"><label>Tensione totale calcolata</label>
        <div class="calc-box">⚡ ${tv}${form.battElements&&form.battVoltage?`<span class="calc-note">(${form.battVoltage}V × ${form.battElements})</span>`:""}</div>
      </div>
    </div>

    <div class="section">
      <div class="sec-title">📝 Note tecniche</div>
      <div class="field"><label>Codici accesso, avvertenze, particolarità...</label>
        <textarea id="f-notes" placeholder="es. Codice menu tecnico: 0012 — NON toccare EPO senza autorizzazione">${esc(form.notes)}</textarea>
      </div>
    </div>

    <button class="save-btn" id="btn-save">💾 Salva impianto</button>
    <div class="spacer"></div>
  </div>`;
}

// ── DETAIL ────────────────────────────────────────────
function renderDetail(){
  const client=DB.clients.find(c=>c.id===activeClientId);
  if(!client){view="search";return renderSearch();}
  let cards="";
  client.ups.forEach(ups=>{
    const bAge=batteryAge(ups.battery?.installDate);
    const hasTech=ups.serial||ups.yearMfg||ups.configIO||ups.voltageIn||ups.voltageOut;
    const hasBatt=ups.battery&&(ups.battery.brand||ups.battery.model||ups.battery.voltage);
    let techRows="",battRows="";
    if(hasTech){
      const rows=[["Seriale",ups.serial],["Anno fabbrica",ups.yearMfg],["Config I/O",ups.configIO],["Tensione ingresso",ups.voltageIn?`${ups.voltageIn}V`:null],["Tensione uscita",ups.voltageOut?`${ups.voltageOut}V`:null]];
      rows.filter(r=>r[1]).forEach(([l,v])=>{ techRows+=`<div class="detail-item"><div class="detail-label">${l}</div><div class="detail-value">${esc(v)}</div></div>`; });
    }
    if(hasBatt){
      const b=ups.battery;
      const rows=[["Marca",b.brand],["Modello",b.model],["Tensione elemento",b.voltage?`${b.voltage}V`:null],["Capacità",b.ah?`${b.ah}Ah`:null],["Elementi/stringa",b.elements],["N° stringhe",b.strings],["Tensione totale",b.totalVoltage&&b.totalVoltage!=="—"?b.totalVoltage:null]];
      rows.filter(r=>r[1]).forEach(([l,v])=>{ battRows+=`<div class="detail-item"><div class="detail-label">${l}</div><div class="detail-value${l==="Tensione totale"?" accent":""}">${esc(v)}</div></div>`; });
      if(b.installDate){ battRows+=`<div class="detail-item"><div class="detail-label">Data installazione</div><div class="detail-value" style="color:${bAge?bAge.color:"#e2e8f0"}">${esc(b.installDate)}${bAge?` — ${bAge.label}`:""}</div></div>`; }
    }
    cards+=`<div class="section" style="padding:0;overflow:hidden">
      <div class="detail-head">
        <div>
          <div class="detail-head-name">${esc(ups.brand)} ${esc(ups.model)}</div>
          <div class="detail-head-sub">${[ups.power?`${ups.power} kVA`:null,ups.topology].filter(Boolean).map(esc).join(" · ")}</div>
        </div>
        <button class="delete-btn" data-ups="${ups.id}" data-client="${client.id}">🗑</button>
      </div>
      ${hasTech?`<div class="detail-sec"><div class="detail-sec-title">⚡ Dati tecnici</div>${techRows}</div>`:""}
      ${hasBatt?`<div class="detail-sec"><div class="detail-sec-title">🔋 Batterie</div>${battRows}</div>`:""}
      ${ups.notes?`<div class="notes-box">📝 ${esc(ups.notes)}</div>`:""}
      <div class="added-at">Inserito il ${ups.addedAt}</div>
    </div>`;
  });
  return`<div class="header">${logoHTML("Scheda cliente")}</div>
  <div class="body">
    <div class="back-btn" id="btn-back">← Torna alla ricerca</div>
    <div style="margin-bottom:16px">
      <div style="font-size:18px;font-weight:700;color:#f8fafc">${esc(client.name)}</div>
      ${client.location?`<div style="font-size:12px;color:#64748b;margin-top:3px">📍 ${esc(client.location)}</div>`:""}
      <div style="font-size:11px;color:#334155;margin-top:3px">${client.ups.length} UPS registrat${client.ups.length===1?"o":"i"}</div>
    </div>
    ${cards}
    <div class="spacer"></div>
  </div>`;
}

// ── EVENTS ────────────────────────────────────────────
function bindEvents(){
  // Search view
  const si=document.getElementById("search-input");
  if(si){si.focus();si.addEventListener("input",e=>{search=e.target.value;render();});}
  const sc=document.getElementById("search-clear");
  if(sc)sc.addEventListener("click",()=>{search="";render();});
  const bn=document.getElementById("btn-new");
  if(bn)bn.addEventListener("click",()=>{view="add";form=emptyForm();addingBrand=false;addingModel=false;render();});
  const fab=document.getElementById("fab-new");
  if(fab)fab.addEventListener("click",()=>{view="add";form=emptyForm();addingBrand=false;addingModel=false;render();});
  document.querySelectorAll(".client-card").forEach(el=>{
    el.addEventListener("click",()=>{activeClientId=parseInt(el.dataset.id);view="detail";render();});
  });

  // Add view
  const bc=document.getElementById("btn-cancel");
  if(bc)bc.addEventListener("click",()=>{view="search";render();});

  // live form sync
  ["clientName","location","brand","model","power","yearMfg","serial","voltageIn","voltageOut",
   "battBrand","battModel","battVoltage","battAh","battElements","battStrings","battInstallDate"].forEach(k=>{
    const el=document.getElementById("f-"+k);
    if(!el)return;
    el.addEventListener("change",e=>{
      form[k]=e.target.value;
      if(k==="brand"){form.model="";addingModel=false;}
      if(k==="brand"&&e.target.value==="__add__"){addingBrand=true;form.brand="";}
      else if(k==="brand"){addingBrand=false;}
      if(k==="model"&&e.target.value==="__add__"){addingModel=true;form.model="";}
      else if(k==="model"){addingModel=false;}
      render();
    });
    if(["battVoltage","battElements"].includes(k)){
      el.addEventListener("input",e=>{form[k]=e.target.value;
        const cb=document.querySelector(".calc-box");
        if(cb){const tv=totalV();cb.innerHTML=`⚡ ${tv}${form.battElements&&form.battVoltage?`<span class="calc-note">(${form.battVoltage}V × ${form.battElements})</span>`:""}`;}
      });
    }
  });
  const fn=document.getElementById("f-notes");
  if(fn)fn.addEventListener("input",e=>{form.notes=e.target.value;});

  // Split toggle
  const st=document.getElementById("f-battSplit");
  if(st){
    st.addEventListener("change",e=>{
      form.battSplit=e.target.checked;
      const cb=document.querySelector(".calc-box");
      if(cb){const tv=totalV();cb.innerHTML=`⚡ ${tv}${form.battElements&&form.battVoltage?`<span class="calc-note">(${form.battVoltage}V × ${form.battElements})</span>`:""}`;}
    });
  }

  // newBrand
  const nb=document.getElementById("f-newBrand");
  if(nb){nb.focus();nb.addEventListener("input",e=>{form.newBrand=e.target.value;});}
  const sbBtn=document.getElementById("btn-saveBrand");
  if(sbBtn)sbBtn.addEventListener("click",()=>{
    const name=form.newBrand.trim();if(!name)return;
    DB.customBrands=DB.customBrands||{};DB.customBrands[name]=[];
    save(DB);form.brand=name;form.newBrand="";form.model="";addingBrand=false;
    showToast(`Marca "${name}" aggiunta!`);render();
  });
  const cbBtn=document.getElementById("btn-cancelBrand");
  if(cbBtn)cbBtn.addEventListener("click",()=>{addingBrand=false;form.newBrand="";render();});

  // newModel
  const nm=document.getElementById("f-newModel");
  if(nm){nm.focus();nm.addEventListener("input",e=>{form.newModel=e.target.value;});}
  const smBtn=document.getElementById("btn-saveModel");
  if(smBtn)smBtn.addEventListener("click",()=>{
    const name=form.newModel.trim();if(!name||!form.brand)return;
    DB.customBrands=DB.customBrands||{};
    DB.customBrands[form.brand]=[...(DB.customBrands[form.brand]||[]),name];
    save(DB);form.model=name;form.newModel="";addingModel=false;
    showToast(`Modello "${name}" aggiunto!`);render();
  });
  const cmBtn=document.getElementById("btn-cancelModel");
  if(cmBtn)cmBtn.addEventListener("click",()=>{addingModel=false;form.newModel="";render();});

  // SAVE
  const saveBtn=document.getElementById("btn-save");
  if(saveBtn)saveBtn.addEventListener("click",()=>{
    // sync textarea
    const fn2=document.getElementById("f-notes");if(fn2)form.notes=fn2.value;
    if(!form.clientName.trim()||!form.brand||!form.model){showToast("Cliente, marca e modello obbligatori","err");return;}
    const ups={
      id:Date.now(),brand:form.brand,model:form.model,
      power:form.power,topology:form.topology,configIO:form.configIO,
      serial:form.serial,yearMfg:form.yearMfg,voltageIn:form.voltageIn,voltageOut:form.voltageOut,
      battery:{brand:form.battBrand,model:form.battModel,voltage:form.battVoltage,
        ah:form.battAh,elements:form.battElements,strings:form.battStrings,
        installDate:form.battInstallDate,split:form.battSplit,totalVoltage:totalV()},
      notes:form.notes,addedAt:new Date().toLocaleDateString("it-IT")
    };
    const i=DB.clients.findIndex(c=>c.name.toLowerCase()===form.clientName.trim().toLowerCase());
    if(i>=0)DB.clients[i].ups.push(ups);
    else DB.clients.push({id:Date.now(),name:form.clientName.trim(),location:form.location,ups:[ups]});
    save(DB);form=emptyForm();addingBrand=false;addingModel=false;
    showToast("✅ Impianto salvato!");view="search";render();
  });

  // Detail
  const bb=document.getElementById("btn-back");
  if(bb)bb.addEventListener("click",()=>{view="search";activeClientId=null;render();});
  document.querySelectorAll(".delete-btn").forEach(btn=>{
    btn.addEventListener("click",e=>{
      e.stopPropagation();
      const upsId=parseInt(btn.dataset.ups),clientId=parseInt(btn.dataset.client);
      const ci=DB.clients.findIndex(c=>c.id===clientId);
      if(ci<0)return;
      DB.clients[ci].ups=DB.clients[ci].ups.filter(u=>u.id!==upsId);
      if(DB.clients[ci].ups.length===0)DB.clients.splice(ci,1);
      save(DB);
      if(!DB.clients.find(c=>c.id===clientId)){view="search";activeClientId=null;}
      showToast("UPS eliminato");render();
    });
  });
}

function esc(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

render();
</script>
</body>
</html>
